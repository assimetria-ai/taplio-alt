<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    
    <!-- Enhanced mobile viewport settings -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />
    
    <!-- iOS-specific meta tags for PWA-like experience -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Product Template" />
    
    <!-- Android/Chrome mobile app configuration -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="color-scheme" content="light dark" />
    
    <!-- Disable auto-detection of phone numbers (prevents unwanted links) -->
    <meta name="format-detection" content="telephone=no" />
    
    <title>Product Template</title>

    <!-- @system: OG / social meta tags — static fallbacks for crawlers that don't run JS -->
    <!-- @custom: replace placeholder values below with your real product info             -->
    <meta name="description" content="Your product tagline here" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Product Template" />
    <meta property="og:description" content="Your product tagline here" />
    <meta property="og:url" content="https://yourproduct.com" />
    <meta property="og:image" content="https://yourproduct.com/og-image.png" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Product Template" />
    <meta name="twitter:description" content="Your product tagline here" />
    <meta name="twitter:url" content="https://yourproduct.com" />
    <meta name="twitter:image" content="https://yourproduct.com/og-image.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
