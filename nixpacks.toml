[phases.setup]
nixPkgs = ["nodejs_20", "npm-9_x"]

[phases.install]
cmds = ["cd client && npm ci && cd ../server && npm ci"]

[phases.build]
cmds = ["cd client && npm run build && cp -r dist ../server/public && cp ../landing.html ../server/public/landing.html"]

[start]
cmd = "node server/src/db/migrations/@system/start.js"
