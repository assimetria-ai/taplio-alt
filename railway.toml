[[services]]
name = "waitlistkit"
source = "products/WaitlistKit"

[services.waitlistkit.build]
builder = "NIXPACKS"
buildCommand = "npm run build"

[services.waitlistkit.deploy]
startCommand = "npm start"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[services]]
name = "nestora"
source = "products/nestora/landing"

[services.nestora.build]
builder = "NIXPACKS"
buildCommand = "npm ci && npm run build"

[services.nestora.deploy]
startCommand = "npm start"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[services]]
name = "broadr"
source = "products/broadr/landing"

[services.broadr.build]
builder = "NIXPACKS"
buildCommand = "npm ci && npm run build"

[services.broadr.deploy]
startCommand = "node server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 100
