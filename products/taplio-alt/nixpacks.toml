# Force Node.js provider — prevents Nixpacks from auto-detecting as a static
# Vite site and generating a Caddy file server.
providers = ["node"]

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm ci", "cd server && npm ci"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "cd server && node src/index.js"
