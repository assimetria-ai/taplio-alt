# Force Node.js provider — prevents Nixpacks from auto-detecting Vite output
# as a static site and deploying with Caddy instead of the Express server.
providers = ["node"]

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm ci", "cd server && npm ci"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "cd server && node src/index.js"
